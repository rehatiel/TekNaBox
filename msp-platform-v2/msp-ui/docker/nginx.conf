server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options    "nosniff"                          always;
    add_header X-Frame-Options           "DENY"                             always;
    add_header X-XSS-Protection          "1; mode=block"                   always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' wss: https://tekn-api.synhow.com wss://tekn-api.synhow.com; frame-ancestors 'none';"
        always;
    server_tokens off;

    # ── Request limits ────────────────────────────────────────────────────────
    client_max_body_size  50M;
    client_body_timeout   30s;
    client_header_timeout 10s;
    keepalive_timeout     65s;
    send_timeout          30s;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ── API proxy → FastAPI ───────────────────────────────────────────────────
    # All /v1/* requests are forwarded to the api container internally.
    # WebSocket connections (device channel) are also proxied here.
    location /v1/ {
        proxy_pass         http://api:8000;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";

        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts — long for WebSocket connections
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout 10s;

        # Disable buffering for streaming responses
        proxy_buffering    off;
    }

    # ── Health endpoint passthrough ───────────────────────────────────────────
    location /health {
        proxy_pass http://api:8000/health;
        proxy_set_header Host $host;
    }

    # ── React SPA — serve index.html for all non-asset routes ────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ─────────────────────────────────────────────────
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
