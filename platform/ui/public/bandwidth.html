<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Bandwidth</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:        #0d1117;
      --bg-card:   #161b22;
      --bg-hover:  #1c2128;
      --border:    #30363d;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --cyan:      #39c5cf;
      --green:     #3fb950;
      --amber:     #e3b341;
      --red:       #f85149;
      --blue:      #58a6ff;
      --bar-sent:  #39c5cf;
      --bar-recv:  #3fb950;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Toolbar ─────────────────────────────────────────────────────── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    #toolbar button.back {
      color: var(--blue);
      background: none;
      border: none;
      font-size: 13px;
      cursor: pointer;
    }
    #toolbar button.back:hover { color: #79c0ff; }

    #device-name { color: var(--muted); }

    .ctrl-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .ctrl-label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .05em; }

    select, input[type=text] {
      background: #21262d;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 12px;
      outline: none;
    }
    select:focus, input:focus { border-color: var(--cyan); }

    #status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
    }

    #status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #6e7681;
      transition: background .3s;
    }
    #status-dot.connecting { background: var(--amber); }
    #status-dot.connected  { background: var(--green); animation: pulse 2s infinite; }
    #status-dot.closed     { background: var(--red); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .4; }
    }

    #status-text { color: var(--muted); }

    #reconnect-btn {
      display: none;
      padding: 3px 10px;
      background: #21262d;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
    }
    #reconnect-btn:hover { background: var(--border); }

    /* ── Summary bar ─────────────────────────────────────────────────── */
    #summary {
      display: flex;
      gap: 24px;
      padding: 8px 16px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .stat { display: flex; flex-direction: column; }
    .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); }
    .stat-value { font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 18px; font-weight: 700; }
    .stat-value.sent { color: var(--bar-sent); }
    .stat-value.recv { color: var(--bar-recv); }
    .stat-value.procs { color: var(--amber); }
    .stat-value.fps { color: var(--muted); font-size: 13px; }

    /* ── Main table area ─────────────────────────────────────────────── */
    #content {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    thead th {
      text-align: left;
      padding: 6px 8px;
      color: var(--muted);
      font-weight: 500;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    thead th:hover { color: var(--text); }
    thead th.sorted { color: var(--cyan); }
    thead th.sorted::after { content: ' ▾'; }

    tbody tr {
      border-bottom: 1px solid rgba(48,54,61,.4);
      transition: background .1s;
    }
    tbody tr:hover { background: var(--bg-hover); }

    td {
      padding: 7px 8px;
      vertical-align: middle;
    }

    .col-rank    { width: 36px; color: var(--muted); font-family: monospace; }
    .col-name    { max-width: 220px; }
    .col-pid     { width: 70px; font-family: monospace; color: var(--muted); }
    .col-bar     { width: 160px; }
    .col-kbps    { width: 90px; font-family: 'Cascadia Code','Fira Code',monospace; text-align: right; }
    .col-total   { width: 90px; font-family: 'Cascadia Code','Fira Code',monospace; text-align: right; color: var(--muted); }
    .col-spark   { width: 80px; }

    .name-cell {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .name-icon {
      width: 20px; height: 20px;
      background: #21262d;
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: var(--muted);
      flex-shrink: 0;
    }
    .name-text   { font-weight: 500; truncate: true; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ip-text     { font-family: monospace; font-size: 12px; }

    /* bar */
    .bar-wrap {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .bar-row {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
    }
    .bar-label { width: 28px; color: var(--muted); text-align: right; flex-shrink: 0; }
    .bar-track {
      flex: 1;
      height: 5px;
      background: #21262d;
      border-radius: 3px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width .4s ease;
      min-width: 2px;
    }
    .bar-fill.sent { background: var(--bar-sent); }
    .bar-fill.recv { background: var(--bar-recv); }

    /* sparkline */
    canvas.spark { display: block; }

    /* placeholder */
    #placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 10px;
      color: var(--muted);
    }
    #placeholder .icon { font-size: 48px; opacity: .2; }
    #placeholder p { font-size: 14px; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- Toolbar -->
<div id="toolbar">
  <button class="back" onclick="window.close()">← Close</button>
  <span id="device-name">Loading…</span>

  <div class="ctrl-group">
    <span class="ctrl-label">Mode</span>
    <select id="mode-select">
      <option value="process">Process (nethogs)</option>
      <option value="ip">IP Pairs (iftop)</option>
    </select>
  </div>

  <div class="ctrl-group">
    <span class="ctrl-label">Interface</span>
    <input type="text" id="iface-input" value="eth0" style="width:80px" />
  </div>

  <button id="apply-btn" onclick="reconnect()"
    style="padding:3px 12px;background:#21262d;border:1px solid var(--border);color:var(--text);border-radius:4px;font-size:12px;cursor:pointer">
    Apply
  </button>

  <div id="status">
    <div id="status-dot" class="connecting"></div>
    <span id="status-text">Connecting…</span>
    <button id="reconnect-btn" onclick="reconnect()">Reconnect</button>
  </div>
</div>

<!-- Summary bar -->
<div id="summary">
  <div class="stat">
    <span class="stat-label">↑ Total Sent</span>
    <span class="stat-value sent" id="sum-sent">—</span>
  </div>
  <div class="stat">
    <span class="stat-label">↓ Total Recv</span>
    <span class="stat-value recv" id="sum-recv">—</span>
  </div>
  <div class="stat">
    <span class="stat-label">Processes</span>
    <span class="stat-value procs" id="sum-procs">—</span>
  </div>
  <div class="stat">
    <span class="stat-label">Last Update</span>
    <span class="stat-value fps" id="sum-age">—</span>
  </div>
</div>

<!-- Table / placeholder -->
<div id="content">
  <div id="placeholder">
    <div class="icon">📡</div>
    <p>Waiting for data from device…</p>
  </div>
  <table id="bw-table" style="display:none">
    <thead id="bw-head"></thead>
    <tbody id="bw-body"></tbody>
  </table>
</div>

<script>
// ── Config from URL ──────────────────────────────────────────────────────────
const params     = new URLSearchParams(window.location.search);
const deviceId   = params.get('device_id');
const deviceName = params.get('device_name') || deviceId;
const token      = params.get('token') || localStorage.getItem('msp_token');

// api_base: e.g. "https://tekn-api.synhow.com" — falls back to same origin (dev proxy)
const apiBase   = params.get('api_base') || '';
const wsProto   = apiBase.startsWith('https') ? 'wss:' : apiBase.startsWith('http') ? 'ws:' : (location.protocol === 'https:' ? 'wss:' : 'ws:');
const wsHost    = apiBase ? apiBase.replace(/^https?:\/\//, '') : location.host;
const wsBase    = `${wsProto}//${wsHost}`;
const fetchBase = apiBase;

document.getElementById('device-name').textContent = deviceName;

// Pre-fill from URL if provided
if (params.get('interface')) document.getElementById('iface-input').value = params.get('interface');
if (params.get('mode'))      document.getElementById('mode-select').value = params.get('mode');

// ── State ────────────────────────────────────────────────────────────────────
let ws          = null;
let sortCol     = 'total';   // 'total' | 'sent' | 'recv' | 'name'
let lastRows    = [];
let sparkData   = {};        // name/ip → [kbps totals] (last 30 points)
let lastFrameTs = null;
let frameCount  = 0;
let fpsInterval = null;

// ── Status helpers ───────────────────────────────────────────────────────────
function setStatus(state, text) {
  document.getElementById('status-dot').className  = state;
  document.getElementById('status-text').textContent = text;
  document.getElementById('reconnect-btn').style.display = state === 'closed' ? 'block' : 'none';
}

// ── WebSocket ────────────────────────────────────────────────────────────────
function buildWsBase() {
  const iface = document.getElementById('iface-input').value.trim() || 'eth0';
  const mode  = document.getElementById('mode-select').value;
  return `${wsBase}/v1/devices/${deviceId}/bandwidth?interface=${encodeURIComponent(iface)}&mode=${encodeURIComponent(mode)}&duration=3600`;
}

async function getTicket() {
  const resp = await fetch(`${fetchBase}/v1/ws-ticket`, {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${token}` },
  });
  if (!resp.ok) throw new Error(`Ticket request failed: ${resp.status}`);
  const data = await resp.json();
  return data.ticket;
}

async function connect() {
  if (!deviceId || !token) {
    setStatus('closed', 'Missing params');
    return;
  }
  setStatus('connecting', 'Connecting…');

  let wsUrl;
  try {
    const ticket = await getTicket();
    wsUrl = buildWsBase() + `&ticket=${encodeURIComponent(ticket)}`;
  } catch (e) {
    setStatus('closed', `Auth failed: ${e.message}`);
    return;
  }
  ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    setStatus('connected', 'Live');
    startFpsCounter();
  };

  ws.onmessage = (event) => {
    try {
      const msg = JSON.parse(event.data);
      if (msg.type === 'frame') {
        handleFrame(msg);
      } else if (msg.type === 'closed') {
        setStatus('closed', `Closed: ${msg.reason || 'session ended'}`);
        stopFpsCounter();
      } else if (msg.type === 'error') {
        setStatus('closed', `Error: ${msg.message}`);
        stopFpsCounter();
      }
    } catch (e) {
      console.error('parse error', e);
    }
  };

  ws.onerror = () => setStatus('closed', 'WebSocket error');

  ws.onclose = (e) => {
    stopFpsCounter();
    if (e.code === 4003)      setStatus('closed', 'Device offline');
    else if (e.code === 4001) setStatus('closed', 'Unauthorized');
    else if (e.code === 4004) setStatus('closed', 'Device not found');
    else                      setStatus('closed', `Disconnected (${e.code})`);
  };
}

function reconnect() {
  if (ws) { ws.close(); ws = null; }
  sparkData = {};
  lastRows  = [];
  frameCount = 0;
  connect();
}

// ── Frame processing ─────────────────────────────────────────────────────────
const SPARK_LEN = 40;

function handleFrame(msg) {
  const rows = msg.rows || [];
  lastFrameTs = msg.ts;
  frameCount++;

  // Update sparklines
  for (const row of rows) {
    const key   = row.name || row.ip || '?';
    const total = (row.sent_kbps || 0) + (row.recv_kbps || 0);
    if (!sparkData[key]) sparkData[key] = [];
    sparkData[key].push(total);
    if (sparkData[key].length > SPARK_LEN) sparkData[key].shift();
  }

  // Sort
  lastRows = [...rows].sort((a, b) => {
    if (sortCol === 'sent') return (b.sent_kbps || 0) - (a.sent_kbps || 0);
    if (sortCol === 'recv') return (b.recv_kbps || 0) - (a.recv_kbps || 0);
    if (sortCol === 'name') return (a.name || a.ip || '').localeCompare(b.name || b.ip || '');
    return ((b.sent_kbps||0)+(b.recv_kbps||0)) - ((a.sent_kbps||0)+(a.recv_kbps||0));
  });

  renderTable(lastRows);
  renderSummary(rows);
}

// ── Render ───────────────────────────────────────────────────────────────────
const mode = () => document.getElementById('mode-select').value;

function renderSummary(rows) {
  const totalSent = rows.reduce((s, r) => s + (r.sent_kbps || 0), 0);
  const totalRecv = rows.reduce((s, r) => s + (r.recv_kbps || 0), 0);
  document.getElementById('sum-sent').textContent  = fmtKbps(totalSent);
  document.getElementById('sum-recv').textContent  = fmtKbps(totalRecv);
  document.getElementById('sum-procs').textContent = rows.length;
  document.getElementById('sum-age').textContent   = lastFrameTs
    ? new Date(lastFrameTs * 1000).toLocaleTimeString()
    : '—';
}

function renderTable(rows) {
  const placeholder = document.getElementById('placeholder');
  const table       = document.getElementById('bw-table');

  if (rows.length === 0) {
    placeholder.style.display = 'flex';
    table.style.display       = 'none';
    return;
  }
  placeholder.style.display = 'none';
  table.style.display       = 'table';

  // Build header once or on mode change
  const head = document.getElementById('bw-head');
  const isProcess = mode() === 'process';
  if (!head.dataset.mode || head.dataset.mode !== mode()) {
    head.dataset.mode = mode();
    head.innerHTML = `<tr>
      <th class="col-rank">#</th>
      <th class="${isProcess ? 'col-name' : 'col-name'}" onclick="setSort('name')">
        ${isProcess ? 'Process' : 'IP Pair'}
      </th>
      ${isProcess ? '<th class="col-pid">PID</th>' : ''}
      <th class="col-bar">Bandwidth</th>
      <th class="col-kbps" onclick="setSort('sent')">↑ Sent</th>
      <th class="col-kbps" onclick="setSort('recv')">↓ Recv</th>
      <th class="col-total" onclick="setSort('total')">Total</th>
      <th class="col-spark">History</th>
    </tr>`;
    // Mark sorted column
    head.querySelectorAll('th').forEach(th => {
      const s = th.getAttribute('onclick')?.match(/setSort\('(\w+)'\)/)?.[1];
      if (s === sortCol) th.classList.add('sorted');
    });
  }

  // Max values for bar scaling
  const maxSent = Math.max(...rows.map(r => r.sent_kbps || 0), 0.01);
  const maxRecv = Math.max(...rows.map(r => r.recv_kbps || 0), 0.01);

  const tbody = document.getElementById('bw-body');
  tbody.innerHTML = '';

  rows.forEach((row, i) => {
    const key       = row.name || row.ip || '?';
    const sent      = row.sent_kbps || 0;
    const recv      = row.recv_kbps || 0;
    const total     = sent + recv;
    const sentPct   = (sent / maxSent * 100).toFixed(1);
    const recvPct   = (recv / maxRecv * 100).toFixed(1);
    const spark     = sparkData[key] || [];

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="col-rank">${i + 1}</td>
      <td class="col-name">
        <div class="name-cell">
          <div class="name-icon">${isProcess ? '⚙' : '🔗'}</div>
          <span class="${isProcess ? 'name-text' : 'ip-text'}" title="${key}">${key}</span>
        </div>
      </td>
      ${isProcess ? `<td class="col-pid">${row.pid ?? '—'}</td>` : ''}
      <td class="col-bar">
        <div class="bar-wrap">
          <div class="bar-row">
            <span class="bar-label" style="color:var(--bar-sent)">↑</span>
            <div class="bar-track"><div class="bar-fill sent" style="width:${sentPct}%"></div></div>
          </div>
          <div class="bar-row">
            <span class="bar-label" style="color:var(--bar-recv)">↓</span>
            <div class="bar-track"><div class="bar-fill recv" style="width:${recvPct}%"></div></div>
          </div>
        </div>
      </td>
      <td class="col-kbps" style="color:var(--bar-sent)">${fmtKbps(sent)}</td>
      <td class="col-kbps" style="color:var(--bar-recv)">${fmtKbps(recv)}</td>
      <td class="col-total">${fmtKbps(total)}</td>
      <td class="col-spark"><canvas class="spark" width="80" height="28" data-key="${key}"></canvas></td>
    `;
    tbody.appendChild(tr);

    // Draw sparkline
    const canvas = tr.querySelector('canvas.spark');
    drawSparkline(canvas, spark);
  });
}

// ── Sparkline ────────────────────────────────────────────────────────────────
function drawSparkline(canvas, data) {
  const ctx  = canvas.getContext('2d');
  const w    = canvas.width;
  const h    = canvas.height;
  ctx.clearRect(0, 0, w, h);

  if (!data || data.length < 2) return;

  const max  = Math.max(...data, 0.01);
  const step = w / (data.length - 1);

  // Gradient fill
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0,   'rgba(57,197,207,.35)');
  grad.addColorStop(1,   'rgba(57,197,207,0)');

  ctx.beginPath();
  data.forEach((v, i) => {
    const x = i * step;
    const y = h - (v / max) * (h - 2) - 1;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  // Close fill area
  ctx.lineTo((data.length - 1) * step, h);
  ctx.lineTo(0, h);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  data.forEach((v, i) => {
    const x = i * step;
    const y = h - (v / max) * (h - 2) - 1;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.strokeStyle = '#39c5cf';
  ctx.lineWidth   = 1.5;
  ctx.stroke();
}

// ── FPS counter ──────────────────────────────────────────────────────────────
function startFpsCounter() {
  stopFpsCounter();
  let lastCount = 0;
  fpsInterval = setInterval(() => {
    const fps = frameCount - lastCount;
    lastCount = frameCount;
    if (fps > 0) {
      document.getElementById('sum-age').textContent =
        lastFrameTs ? new Date(lastFrameTs * 1000).toLocaleTimeString() : '—';
    }
  }, 1000);
}
function stopFpsCounter() {
  if (fpsInterval) { clearInterval(fpsInterval); fpsInterval = null; }
}

// ── Sort ─────────────────────────────────────────────────────────────────────
function setSort(col) {
  sortCol = col;
  document.querySelectorAll('thead th').forEach(th => {
    const s = th.getAttribute('onclick')?.match(/setSort\('(\w+)'\)/)?.[1];
    th.classList.toggle('sorted', s === col);
  });
  if (lastRows.length) handleFrame({ rows: lastRows, ts: lastFrameTs });
}

// ── Formatting ───────────────────────────────────────────────────────────────
function fmtKbps(kbps) {
  if (kbps >= 1024 * 1024) return (kbps / 1024 / 1024).toFixed(2) + ' GB/s';
  if (kbps >= 1024)        return (kbps / 1024).toFixed(2) + ' MB/s';
  if (kbps >= 1)           return kbps.toFixed(1) + ' KB/s';
  return (kbps * 1024).toFixed(0) + ' B/s';
}

// ── Boot ─────────────────────────────────────────────────────────────────────
connect();
</script>
</body>
</html>
